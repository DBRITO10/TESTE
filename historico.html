<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico do Sistema - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        /* Filtros */
        .filtros-grid { display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 15px; margin-bottom: 20px; align-items: flex-end; }
        .filtros-grid label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .filtros-grid input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-buscar { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; height: 40px; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }

        .log-acao { font-weight: bold; color: #d32f2f; }
        .log-data { color: #666; font-size: 12px; }
        .log-user { color: #1565c0; font-weight: 500; }
        
        #inputBusca { border: 2px solid #e0e0e0; }
        #inputBusca:focus { border-color: var(--primary); outline: none; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2>HISTÓRICO DE AÇÕES (LOGS)</h2>
        
        <div class="filtros-grid">
            <div>
                <label>DATA INICIAL</label>
                <input type="date" id="dataInicio">
            </div>
            <div>
                <label>DATA FINAL</label>
                <input type="date" id="dataFim">
            </div>
            <div>
                <label>BUSCA RÁPIDA (USUÁRIO, AÇÃO OU DETALHE)</label>
                <input type="text" id="inputBusca" placeholder="Ex: Nome, Placa, Cadastro...">
            </div>
            <button class="btn-buscar" id="btnFiltrar">PESQUISAR PERÍODO</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>DATA/HORA</th>
                        <th>USUÁRIO</th>
                        <th>AÇÃO</th>
                        <th>DETALHES DA OPERAÇÃO</th>
                    </tr>
                </thead>
                <tbody id="corpoHistorico">
                    <tr><td colspan="4" style="text-align:center;">Selecione o período e clique em pesquisar.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="js/historico.js"></script>
</body>
</html>
