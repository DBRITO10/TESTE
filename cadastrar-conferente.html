<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Conferentes - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; }
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-cancelar { width: 100%; background: #757575; color: white; border: none; padding: 10px; margin-top: 10px; border-radius: 4px; display: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-acao { border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div>
        <a href="menu.html" style="color:white; text-decoration:none;">⬅️</a>
        <span>Olá, <strong id="userName">...</strong></span>
    </div>
    <button id="btnSair" style="background:none; border:1px solid white; color:white; cursor:pointer;">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2 id="tituloForm">CADASTRAR NOVO CONFERENTE</h2>
        <form id="formConf"> <input type="hidden" id="editId">
            <label>NOME COMPLETO</label>
            <input type="text" id="nomeConf" required style="text-transform: uppercase;">
            <label>MATRÍCULA / ID</label>
            <input type="text" id="idConf" required>
            <button type="submit" class="btn-save" id="btnSalvar">SALVAR CONFERENTE</button>
            <button type="button" class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicao()">CANCELAR EDIÇÃO</button>
        </form>
    </div>

    <div class="card">
        <h2>CONFERENTES CADASTRADOS</h2>
        <table>
            <thead>
                <tr>
                    <th>NOME</th>
                    <th>MATRÍCULA</th>
                    <th style="text-align: center;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoConferentes">
                </tbody>
        </table>
    </div>
</div>

<script type="module" src="js/conferentes.js"></script>
</body>
</html>
