<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Destinos - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; }
        
        /* Header Padronizado */
        header { 
            background: var(--primary); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 700px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; text-align: center; }
        
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; font-size: 16px; }
        
        /* Campo de Busca */
        .search-box { margin-bottom: 15px; position: relative; }
        .search-box input { background: #fffde7; border: 1px solid #fbc02d; }

        .btn-save { width: 100%; background: var(--success); color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-cancelar { width: 100%; background: #757575; color: white; border: none; padding: 10px; margin-top: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; display: none; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn-acao { border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .edit { background: #fbc02d; margin-right: 5px; }
        .del { background: #ffcdd2; color: #c62828; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            header { padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Olá, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2 id="tituloForm">CADASTRAR DESTINO / CENTRAL</h2>
        <form id="formDestino">
            <input type="hidden" id="editId">
            <label>NOME DA CENTRAL OU CIDADE</label>
            <input type="text" id="nomeDestino" placeholder="Ex: 113 - SERRA" required>
            
            <button type="submit" class="btn-save" id="btnSalvar">SALVAR DESTINO</button>
            <button type="button" class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicao()">CANCELAR EDIÇÃO</button>
        </form>
    </div>

    <div class="card">
        <h2>CENTRAIS CADASTRADAS</h2>
        
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="🔍 BUSCAR DESTINO...">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th style="text-align: right;">AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoDestino">
                    <tr><td colspan="2" style="text-align: center;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="js/gerenciar-destinos.js"></script>
</body>
</html>
