<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>MONITORAMENTO SIMONETTI - LOGÍSTICA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />

<style>
    :root { 
        --simonetti-red: #E30613; 
        --simonetti-pink: #FF4D6D; 
        --bg-light: #F4F4F9; 
        --border-color: #ddd;
        --group-border-color: #000000;
        --group-border-width: 6px;
    }
    
    body { background: var(--bg-light); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
    
    header { 
        background: var(--simonetti-red); padding: 0 2vw; 
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 0.6vh solid var(--simonetti-pink);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        height: 8vh;
        position: relative;
        z-index: 1000; /* Garante que o header do site fique acima de tudo */
    }

    h1 { margin: 0; font-size: 2.2rem; color: #fff; font-weight: 900; letter-spacing: 1px; }

    .main-container { 
        display: flex; 
        height: 92vh; 
        padding: 15px; 
        gap: 15px; 
        box-sizing: border-box;
    }

    /* CONTAINER DA TABELA */
    .table-section { 
        flex: 3; 
        background: #fff; 
        border-radius: 15px; 
        overflow: hidden; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        border: 2px solid #333;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    #scrollContainer {
        overflow-y: hidden;
        overflow-x: hidden;
        flex-grow: 1;
        position: relative;
    }

    /* O SEGREDO DO CABEÇALHO OPACIFICADO */
    table.dataTable thead {
        position: sticky;
        top: 0;
        z-index: 500; /* Camada alta para bloquear os dados */
        background-color: var(--simonetti-red) !important; /* Fundo sólido */
    }

    table.dataTable thead th { 
        background: var(--simonetti-red) !important; 
        color: #ffffff !important; 
        font-size: 1.4rem !important; /* Impacto visual */
        padding: 20px 10px !important; 
        text-align: center !important; 
        text-transform: uppercase;
        font-weight: 900 !important;
        
        /* LINHA PRETA DIVISORA IMPACTANTE */
        border-bottom: 6px solid #000000 !important; 
        
        /* Bordas laterais para fechar qualquer buraco visual */
        border-left: 1px solid rgba(255,255,255,0.1) !important;
        border-right: 1px solid rgba(255,255,255,0.1) !important;
        
        /* Sombra forte para esconder o movimento por baixo */
        box-shadow: 0 10px 15px -5px rgba(0,0,0,0.4);
    }

    /* AJUSTE DOS DADOS PARA NÃO VAZAREM */
    table.dataTable { 
        width: 100% !important; 
        border-collapse: separate !important; /* Alterado para evitar bugs de z-index */
        border-spacing: 0;
        margin: 0 !important;
        table-layout: fixed !important;
    }
    
    table.dataTable tbody td { 
        font-size: 1.25rem !important; 
        padding: 14px 5px !important; 
        text-align: center !important; 
        font-weight: 700; 
        border-bottom: 1px solid #eee;
        background-color: #ffffff; /* Fundo branco sólido em cada célula */
        position: relative;
        z-index: 10; /* Z-index baixo para passar atrás do cabeçalho */
    }

    /* BORDAS DO GRUPO */
    .group-start td { border-top: var(--group-border-width) solid var(--group-border-color) !important; }
    .group-end td { border-bottom: var(--group-border-width) solid var(--group-border-color) !important; }
    .group-side-left { border-left: var(--group-border-width) solid var(--group-border-color) !important; }
    .group-side-right { border-right: var(--group-border-width) solid var(--group-border-color) !important; }

    /* ESTILOS DE APOIO */
    .bg-armario { background-color: #FFFF00 !important; color: #000 !important; }
    .bg-mesa { background-color: #00B050 !important; color: #000 !important; }
    .bg-tecnologia { background-color: #00B0FF !important; color: #000 !important; }

    .pill { 
        padding: 8px; border-radius: 8px; color: #fff; font-size: 1.1rem; 
        font-weight: 800; display: inline-block; width: 95%; 
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    .box-num { font-size: 2.5rem !important; }
    .box-green { color: #27ae60 !important; }
    .box-red { color: #E74C3C !important; }

    /* DASHBOARD */
    .dash-section { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 350px; }
    .kpi-card { 
        background: #fff; padding: 1.5vh; text-align: center; border-radius: 15px;
        border-bottom: 10px solid var(--simonetti-red); 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border: 1px solid var(--border-color);
    }
    .kpi-value { font-size: 4.5rem; font-weight: 900; color: var(--simonetti-red); display: block; line-height: 1; }
    .kpi-label { font-size: 1.2rem; font-weight: 800; color: #333; }

    .chart-box { 
        background: #fff; padding: 15px; border-radius: 15px; 
        flex-grow: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        border: 1px solid var(--border-color);
    }

    .btn-fullscreen { background: #fff; color: var(--simonetti-red); border: 2px solid var(--simonetti-red); padding: 10px 20px; font-weight: 900; border-radius: 10px; cursor: pointer; }
</style>
</head>
<body>

<header>
    <h1>RECEBIMENTO SIMONETTI</h1>
    <button class="btn-fullscreen" id="fsBtn" onclick="toggleFullScreen()">📺 TELA CHEIA</button>
</header>

<div class="main-container">
    <div class="table-section">
        <div id="scrollContainer">
            <table id="tabelaTV" class="display nowrap">
                <thead>
                    <tr>
                        <th style="width: 14%;">DATA</th>
                        <th style="width: 26%;">FORNECEDOR</th>
                        <th style="width: 15%;">TIPO</th>
                        <th style="width: 18%;">PRODUTO</th>                    
                        <th style="width: 17%;">STATUS</th>
                        <th style="width: 10%;">BOX</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="dash-section">
        <div class="kpi-card">
            <span class="kpi-label">TOTAL DE CARROS</span>
            <span id="countCarros" class="kpi-value">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">TOTAL AGENDAS</span>
            <span id="countAgendas" class="kpi-value">0</span>
        </div>
        
        <div class="chart-box">
            <h3 style="margin: 0 0 10px 0; color:#444; font-size: 1.1rem; text-align: center; font-weight: 800;">STATUS DAS AGENDAS</h3>
            <div style="flex-grow: 1; position: relative;">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);

const csvUrl = "https://docs.google.com/spreadsheets/d/1Ore02M4GARvE6hldNDZmiVNDrABb4dgaZO7wlMY-fjs/export?format=csv&gid=2090543957";

const coresStatus = {
    "CARGA RECEBIDA": '#2ECC71', "CANCELADA": '#E74C3C', "EM RECEBIMENTO": '#F1C40F', 
    "NO PATIO - FICOU P/ AMANHÃ": '#34495E', "SOB AJUSTE": '#8B27F5', "REAGENDA": '#9B591B',
    "NO PATIO - FICOU DE ONTEM": '#B249BF', "NO PATIO - SOB ENCAIXE": '#ff7625',         
    "NO PATIO": '#1A9EF0', "EM ATRASO": '#FF1744', "PENDENTE": '#95A5A6'
};

let chartStatus;
let isScrolling = false;
let waitingAtTop = true;

$(document).ready(() => {
    carregarDados();
    setInterval(carregarDados, 60000); 
    setTimeout(() => { waitingAtTop = false; }, 3000);
});

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fsBtn').innerText = "✖ SAIR";
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        document.getElementById('fsBtn').innerText = "📺 TELA CHEIA";
    }
}

function carregarDados() {
    Papa.parse(csvUrl, {
        download: true, 
        header: true, 
        skipEmptyLines: true,
        complete: function(results) { 
            // FILTRO DE EXIBIÇÃO: Remove linhas que o Sheets envia vazias por causa de filtros/ocultação
            const dadosVisiveis = results.data.filter(row => {
                const temFornecedor = row["FORNECEDOR"] && row["FORNECEDOR"].trim() !== "";
                const temData = row["DATA"] && row["DATA"].trim() !== "";
                return temFornecedor && temData;
            });
            renderizar(dadosVisiveis); 
        }
    });
}

function renderizar(dados) {
    if ($.fn.DataTable.isDataTable('#tabelaTV')) $('#tabelaTV').DataTable().destroy();
    
    // DEFINIÇÃO DA PRIORIDADE DE STATUS
    const prioridadeStatus = {
        "EM RECEBIMENTO": 1,
        "CARGA RECEBIDA": 2,
        "EM ATRASO": 3
    };

    // ORDENAÇÃO CUSTOMIZADA: STATUS -> BOX -> CÓDIGO
    dados.sort((a, b) => {
        const statusA = (a["STATUS"] || "").toUpperCase();
        const statusB = (b["STATUS"] || "").toUpperCase();

        // 1. PESO DO STATUS
        const pesoA = prioridadeStatus[statusA] || 99;
        const pesoB = prioridadeStatus[statusB] || 99;

        if (pesoA !== pesoB) {
            return pesoA - pesoB;
        }

        // Se o Status for o mesmo, desempata pelo BOX
        if (statusA === statusB) {
            // 2. ORDENAÇÃO POR BOX (Menor para o Maior)
            // Tratamos como número para evitar que "10" venha antes de "2"
            const boxA = parseInt(a["BOX"]) || 999;
            const boxB = parseInt(b["BOX"]) || 999;

            if (boxA !== boxB) {
                return boxA - boxB;
            }
        }

        // 3. SE O STATUS E O BOX FOREM IGUAIS, ORDENA PELO CÓDIGO
        const codA = (a["CODIGO"] || "").toString().toUpperCase();
        const codB = (b["CODIGO"] || "").toString().toUpperCase();
        return codA.localeCompare(codB);
    });

    const body = $("#tabelaTV tbody").empty();
    const stats = {};
    const codigosUnicos = new Set();

    dados.forEach((r, index) => {
        const codigo = (r["CODIGO"] || "").trim();
        const proximo = dados[index + 1] ? (dados[index + 1]["CODIGO"] || "").trim() : null;
        const anterior = dados[index - 1] ? (dados[index - 1]["CODIGO"] || "").trim() : null;

        const status = (r["STATUS"] || "PENDENTE").toUpperCase();
        const tipoProduto = (r["TIPO DE PRODUTO"] || "").toUpperCase();
        const box = r["BOX"] || "-";

        if (codigo) codigosUnicos.add(codigo);
        stats[status] = (stats[status] || 0) + 1;

        // BORDAS DE AGRUPAMENTO
        // IMPORTANTE: Agora as bordas pretas vão circular o CÓDIGO dentro da nova ordem de BOX
        let rowClasses = "";
        if (codigo !== anterior) rowClasses += " group-start";
        if (codigo !== proximo) rowClasses += " group-end";

        let tipoCorClass = "";
        const itensAmarelos = ["PAINEL", "ROUPEIRO", "COMODA", "MULTIUSO", "MODULO", "COZINHA", "ARMARIO"];
        
        if(["CELULAR", "ROBO", "TABLET", "NOTEBOOK"].some(p => tipoProduto.includes(p))) {
            tipoCorClass = "bg-tecnologia";
        } 
        else if(itensAmarelos.some(p => tipoProduto.includes(p))) {
            tipoCorClass = "bg-armario";
        } 
        else if(tipoProduto.includes("MESA")) {
            tipoCorClass = "bg-mesa";
        }

        const boxColorClass = (status === "CARGA RECEBIDA") ? "box-green" : "box-red";

        const linhaHtml = `
            <tr class="${rowClasses}">
                <td class="group-side-left">${r["DATA"] || ""}</td>
                <td>${r["FORNECEDOR"] || ""}</td>
                <td class="${tipoCorClass}">${tipoProduto}</td>
                <td>${r["PRODUTO"] || ""}</td> 
                <td><span class="pill" style="background:${coresStatus[status] || '#999'}">${status}</span></td>
                <td class="group-side-right box-num ${boxColorClass}">${box}</td>
            </tr>`;
        
        body.append(linhaHtml);
    });

    $('#tabelaTV').DataTable({ paging: false, info: false, ordering: false, searching: false, autoWidth: false });
    
    $("#countCarros").text(codigosUnicos.size);
    $("#countAgendas").text(dados.length);
    
    atualizarGrafico(stats, dados.length);
    if(!isScrolling) iniciarAutoScroll();
}

function atualizarGrafico(stats, total) {
    if(chartStatus) chartStatus.destroy();
    const ctx = document.getElementById('statusChart').getContext('2d');
    chartStatus = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(stats),
            datasets: [{
                data: Object.values(stats),
                backgroundColor: Object.keys(stats).map(k => coresStatus[k] || "#ccc"),
                borderWidth: 2, borderColor: '#fff'
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 12, weight: 'bold' }, padding: 10 } },
                datalabels: {
                    color: '#fff', font: { size: 14, weight: 'bold' },
                    formatter: (val) => `${val} (${((val/total)*100).toFixed(0)}%)`
                }
            }
        }
    });
}

function iniciarAutoScroll() {
    isScrolling = true;
    const el = document.getElementById('scrollContainer');
    let speed = 0.015; // Velocidade ajustada para fluidez em telas grandes
    let currentScroll = 0;

    function step() {
        if (!delayRestart && !waitingAtTop) {
            // Usamos um multiplicador menor e acumulamos o valor para evitar saltos de pixel
            currentScroll += 0.8; 
            el.scrollTop = Math.floor(currentScroll);

            // Verifica se chegou no fim
            if (el.scrollTop >= (el.scrollHeight - el.offsetHeight - 1)) {
                delayRestart = true;
                setTimeout(() => {
                    el.scrollTop = 0;
                    currentScroll = 0;
                    waitingAtTop = true;
                    delayRestart = false;
                    setTimeout(() => { waitingAtTop = false; }, 3000);
                }, 4000);
            }
        }
        requestAnimationFrame(step);
    }
    
    let delayRestart = false;
    requestAnimationFrame(step);
}
</script>
</body>
</html>
