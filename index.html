<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>PAINEL DE RECEBIMENTO - MÓVEIS SIMONETTI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />

    <style>
        :root { --blue-ms: #1E90FF; --dark-blue: #104E8B; --bg: #000; --text: #fff; }
        
        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* O scroll será controlado via JS */
            color: var(--text);
        }
        
        /* Cabeçalho Gigante */
        header { 
            background: var(--dark-blue); 
            padding: 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--blue-ms);
        }
        h1 { margin: 0; font-size: 3.5rem; text-transform: uppercase; letter-spacing: 3px; }

        /* Layout Split: Tabela (Esquerda) e Dash (Direita) */
        .main-container { display: flex; height: calc(100vh - 120px); padding: 10px; gap: 15px; }

        /* Lado da Tabela */
        .table-section { flex: 2; background: #111; border-radius: 10px; padding: 10px; overflow: hidden; }
        
        /* Lado do Gráfico e Contadores */
        .dash-section { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }

        .kpi-card { 
            background: #222; 
            border: 2px solid var(--blue-ms); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center;
        }
        .kpi-value { font-size: 5rem; font-weight: bold; color: #00FF00; display: block; }
        .kpi-label { font-size: 1.5rem; text-transform: uppercase; color: #aaa; }

        .chart-container { 
            background: #fff; /* Fundo branco para o gráfico ter contraste */
            padding: 15px; 
            border-radius: 15px; 
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Estilização da Tabela para TV */
        table.dataTable { width: 100% !important; border-collapse: collapse !important; border: none !important; color: #fff !important; }
        table.dataTable thead th { 
            background: #333 !important; 
            color: #FFD700 !important; 
            font-size: 1.8rem !important; 
            padding: 20px !important; 
            border: 1px solid #444 !important;
        }
        table.dataTable tbody td { 
            font-size: 1.6rem !important; 
            padding: 18px !important; 
            border: 1px solid #333 !important; 
            font-weight: 500;
        }
        
        .zebra-even { background-color: #1a1a1a; }
        .zebra-odd { background-color: #000; }

        /* Status Pill Gigante */
        .pill { 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            display: inline-block; 
            color: #fff;
            width: 100%;
            text-align: center;
        }

        /* Ocultar elementos desnecessários do DataTable */
        .dataTables_wrapper .dataTables_filter, 
        .dataTables_wrapper .dataTables_info, 
        .dataTables_wrapper .dataTables_paginate { display: none; }
    </style>
</head>
<body>

<header>
    <h1>PAINEL DE RECEBIMENTO - MÓVEIS SIMONETTI</h1>
</header>

<div class="main-container">
    <div class="table-section">
        <table id="tabelaTV" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>STATUS</th>
                    <th>FORNECEDOR</th>
                    <th>TIPO</th>
                    <th>PRODUTO</th>
                    <th>BOX</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="dash-section">
        <div class="kpi-card">
            <span class="kpi-label">Total de Carros</span>
            <span id="countCarros" class="kpi-value">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Agendas Hoje</span>
            <span id="countAgendas" class="kpi-value">0</span>
        </div>
        <div class="chart-container">
            <canvas id="statusChart"></canvas>
        </div>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);

const csvUrl = "https://docs.google.com/spreadsheets/d/1Ore02M4GARvE6hldNDZmiVNDrABb4dgaZO7wlMY-fjs/export?format=csv&gid=2090543957";

const coresStatus = {
    "CARGA RECEBIDA": '#4CAF50', "NO PATIO - FICOU P/ AMANHÃ": '#3ACFB9', "CANCELADA": '#FF0000',    
    "SOB AJUSTE": '#8B27F5', "NO PATIO - SOB ENCAIXE": '#ff7625', "NO PATIO - FICOU DE ONTEM": '#B249BF',
    "EM RECEBIMENTO": '#FFC107', "NO PATIO": '#03A9F4', "EM ATRASO": '#F44336', "REAGENDA": '#9B591B'
};

function getColorTipoProduto(text) {
    const tp = (text || "").toUpperCase();
    if (['ROUPEIRO', 'ARMARIO', 'COZINHA', 'PAINEL', 'MODULO', 'MULTIUSO', 'BALCAO', 'COMODA'].some(x => tp.includes(x))) return '#FFFF00';
    if (['CELULAR', 'TABLET', 'RELOGIO', 'ROBO', 'NOTEBOOK'].some(x => tp.includes(x))) return '#00BFFF';
    if (tp.includes('MESA')) return '#4CAF50';
    return null;
}

let table, chartStatus;

$(document).ready(function() {
    carregarDados();
    // Atualiza os dados a cada 5 minutos
    setInterval(carregarDados, 300000);
});

function carregarDados() {
    Papa.parse(csvUrl, { 
        download: true, 
        header: true, 
        skipEmptyLines: true, 
        complete: res => processarDados(res.data) 
    });
}

function processarDados(dados) {
    if ($.fn.DataTable.isDataTable('#tabelaTV')) {
        $('#tabelaTV').DataTable().destroy();
    }

    const body = $("#tabelaTV tbody").empty();
    const stats = {};
    const idsCarros = new Set();

    dados.forEach((r, index) => {
        const st = (r["STATUS"] || "").trim().toUpperCase();
        const tp = (r["TIPO DE PRODUTO"] || "").trim().toUpperCase();
        const prod = (r["PRODUTO"] || "").trim(); // Coluna Produto solicitada
        const cod = r["CODIGO"] || r["CARGAS"] || index;
        const tpColor = getColorTipoProduto(tp);

        idsCarros.add(cod);
        stats[st] = (stats[st] || 0) + 1;

        body.append(`<tr>
            <td>${(r["DATA"] || "").replace(/\*/g, "")}</td>
            <td><span class="pill" style="background:${coresStatus[st] || '#4682B4'}">${st}</span></td>
            <td style="color: #FFD700">${r["FORNECEDOR"] || ""}</td>
            <td style="${tpColor ? 'color:'+tpColor+'; font-weight:bold;' : ''}">${tp}</td>
            <td>${prod}</td>
            <td style="font-size: 2.2rem !important; color: #00FF00;">${r["BOX"] || "-"}</td>
        </tr>`);
    });

    table = $('#tabelaTV').DataTable({ 
        paging: false, 
        info: false, 
        ordering: false,
        stripeClasses: ['zebra-odd', 'zebra-even']
    });

    $("#countCarros").text(idsCarros.size);
    $("#countAgendas").text(dados.length);

    gerarGrafico(stats, dados.length);
    iniciarAutoScroll();
}

function gerarGrafico(stats, total) {
    if(chartStatus) chartStatus.destroy();
    
    chartStatus = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: { 
            labels: Object.keys(stats), 
            datasets: [{ 
                data: Object.values(stats), 
                backgroundColor: Object.keys(stats).map(k => coresStatus[k] || "#ccc"),
                borderWidth: 0
            }] 
        },
        options: { 
            maintainAspectRatio: false, 
            plugins: { 
                legend: { position: 'bottom', labels: { font: { size: 16, weight: 'bold' }, color: '#333' } },
                datalabels: {
                    color: '#000',
                    font: { weight: 'bold', size: 18 },
                    formatter: (val) => { return ((val/total)*100).toFixed(0) + "%"; }
                }
            } 
        }
    });
}

function iniciarAutoScroll() {
    const container = $('.table-section');
    function scroll() {
        const curr = container.scrollTop();
        const max = container[0].scrollHeight - container.height();
        if (curr >= max) {
            setTimeout(() => container.animate({ scrollTop: 0 }, 2000), 5000);
        } else {
            container.animate({ scrollTop: curr + 300 }, 1500, 'linear');
        }
    }
    setInterval(scroll, 4000);
}
</script>
</body>
</html>
