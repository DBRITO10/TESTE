<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>MONITORAMENTO RECEBIMENTO - SIMONETTI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />

    <style>
        :root { 
            --simonetti-red: #E30613; 
            --simonetti-pink: #FF4D6D; /* Rosa puxado pro vermelho */
            --bg-light: #F4F4F9; 
            --text-dark: #222; 
        }
        
        body { 
            background: var(--bg-light); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            color: var(--text-dark); 
            overflow: hidden; 
        }
        
        header { 
            background: var(--simonetti-red); 
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom: 6px solid var(--simonetti-pink);
        }

        h1 { margin: 0; font-size: 3rem; text-transform: uppercase; font-weight: 900; color: #fff; letter-spacing: -1px; }

        .btn-fullscreen {
            background: #fff;
            color: var(--simonetti-red);
            border: none;
            padding: 15px 35px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-fullscreen:hover { transform: scale(1.05); background: var(--simonetti-pink); color: #fff; }

        .main-container { display: flex; height: calc(100vh - 120px); padding: 20px; gap: 20px; }

        /* Tabela Central */
        .table-section { 
            flex: 3; 
            background: #fff; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow-y: auto; 
            scrollbar-width: none; 
        }
        .table-section::-webkit-scrollbar { display: none; }
        
        /* Dash Lateral */
        .dash-section { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        .kpi-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .kpi-card { 
            background: #fff; 
            padding: 20px; 
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-bottom: 8px solid var(--simonetti-red);
        }
        .kpi-value { font-size: 5rem; font-weight: 900; color: var(--simonetti-red); display: block; line-height: 1; }
        .kpi-label { font-size: 1.4rem; font-weight: 700; color: #666; text-transform: uppercase; }

        .chart-box { 
            background: #fff; 
            padding: 25px; 
            border-radius: 20px; 
            flex-grow: 1; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo Tabela - Otimizada para TV */
        table.dataTable { width: 100% !important; border-collapse: collapse !important; }
        table.dataTable thead th { 
            background: #f8f9fa !important; 
            color: #333 !important; 
            font-size: 1.6rem !important; 
            padding: 25px !important; 
            text-align: center !important;
            border-bottom: 4px solid var(--simonetti-red) !important;
        }
        table.dataTable tbody td { 
            font-size: 1.8rem !important; 
            padding: 22px !important; 
            font-weight: 600;
            border-bottom: 1px solid #eee !important; 
            text-align: center !important;
        }
        
        .row-even { background-color: #ffffff; }
        .row-odd { background-color: #fdfdfd; }

        .pill { 
            padding: 10px 15px; 
            border-radius: 12px; 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: #fff;
            display: inline-block;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Ocultar elementos do DataTables que você não quer */
        .dataTables_filter, .dataTables_length { display: none; }
    </style>
</head>
<body>

<header>
    <h1>LOGÍSTICA - MÓVEIS SIMONETTI</h1>
    <button class="btn-fullscreen" onclick="toggleFullScreen()">📺 TELA CHEIA</button>
</header>

<div class="main-container" id="painelPrincipal">
    <div class="table-section" id="scrollContainer">
        <table id="tabelaTV" class="display nowrap">
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>DATA</th>
                    <th>STATUS</th>
                    <th>FORNECEDOR</th>
                    <th>TIPO</th>
                    <th>BOX</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="dash-section">
        <div class="kpi-group">
            <div class="kpi-card">
                <span class="kpi-label">CARROS</span>
                <span id="countCarros" class="kpi-value">0</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">AGENDAS</span>
                <span id="countAgendas" class="kpi-value">0</span>
            </div>
        </div>
        <div class="chart-box">
            <h3 style="margin-top:0; color:#444">RESUMO DE STATUS</h3>
            <canvas id="statusChart"></canvas>
        </div>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);

const csvUrl = "https://docs.google.com/spreadsheets/d/1Ore02M4GARvE6hldNDZmiVNDrABb4dgaZO7wlMY-fjs/export?format=csv&gid=2090543957";

// Cores vibrantes para os status
const coresStatus = {
    "CARGA RECEBIDA": '#2ECC71', 
    "NO PATIO - FICOU P/ AMANHÃ": '#3498DB', 
    "CANCELADA": '#E74C3C',    
    "SOB AJUSTE": '#9B59B6', 
    "NO PATIO - SOB ENCAIXE": '#E67E22', 
    "NO PATIO - FICOU DE ONTEM": '#F06292',
    "EM RECEBIMENTO": '#F1C40F', 
    "NO PATIO": '#34495E', 
    "EM ATRASO": '#FF1744', 
    "REAGENDA": '#795548'
};

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

let table, chartStatus;

$(document).ready(() => {
    carregar();
    setInterval(carregar, 60000); // Atualiza a cada 1 minuto
    iniciarAutoScroll();
});

function carregar() {
    Papa.parse(csvUrl, { 
        download: true, header: true, skipEmptyLines: true, 
        complete: res => renderizar(res.data) 
    });
}

function renderizar(dados) {
    if ($.fn.DataTable.isDataTable('#tabelaTV')) $('#tabelaTV').DataTable().destroy();
    
    const body = $("#tabelaTV tbody").empty();
    const stats = {};
    const idsCarros = new Set();

    dados.forEach((r) => {
        const st = (r["STATUS"] || "").trim().toUpperCase();
        const cod = (r["CARGAS"] || "---").trim();
        
        // Lógica de contagem
        if(cod !== "---") idsCarros.add(cod);
        stats[st] = (stats[st] || 0) + 1;

        body.append(`<tr>
            <td style="color:#777">#${cod}</td>
            <td style="color:#444">${(r["DATA"] || "").replace(/\*/g, "")}</td>
            <td><span class="pill" style="background:${coresStatus[st] || '#999'}">${st}</span></td>
            <td style="color:var(--simonetti-red); font-weight:bold">${r["FORNECEDOR"] || ""}</td>
            <td>${r["TIPO DE PRODUTO"] || ""}</td>
            <td style="font-size: 2.2rem !important; color:#27ae60; font-weight:900">${r["BOX"] || "-"}</td>
        </tr>`);
    });

    table = $('#tabelaTV').DataTable({ 
        paging: false, info: false, ordering: false,
        stripeClasses: ['row-odd', 'row-even']
    });

    $("#countCarros").text(idsCarros.size);
    $("#countAgendas").text(dados.length);
    atualizarGrafico(stats, dados.length);
}

function atualizarGrafico(stats, total) {
    if(chartStatus) chartStatus.destroy();
    chartStatus = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut', // Doughnut fica mais moderno para TVs
        data: { 
            labels: Object.keys(stats), 
            datasets: [{ 
                data: Object.values(stats), 
                backgroundColor: Object.keys(stats).map(k => coresStatus[k] || "#ccc"),
                borderWidth: 5,
                borderColor: '#fff'
            }] 
        },
        options: { 
            maintainAspectRatio: false,
            plugins: { 
                legend: { 
                    position: 'bottom', 
                    labels: { font: { size: 18, weight: 'bold' }, color: '#333', padding: 20 } 
                },
                datalabels: { 
                    color: '#fff', 
                    font: { size: 20, weight: '900' }, 
                    formatter: (v) => {
                        let pct = ((v/total)*100).toFixed(0) + "%";
                        return v + "\n(" + pct + ")"; // Exibe quantidade e percentual
                    },
                    textAlign: 'center'
                }
            } 
        }
    });
}

function iniciarAutoScroll() {
    const el = document.getElementById('scrollContainer');
    let speed = 1.2; 
    function step() {
        el.scrollTop += speed;
        if (el.scrollTop >= (el.scrollHeight - el.offsetHeight)) {
            setTimeout(() => { el.scrollTop = 0; }, 4000); // Pausa no fim
        }
        requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}
</script>
</body>
</html>
