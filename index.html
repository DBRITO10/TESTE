<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>MONITORAMENTO SIMONETTI - LOGÍSTICA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />

    <style>
        :root { 
            --simonetti-red: #E30613; 
            --simonetti-pink: #FF4D6D; 
            --bg-light: #F4F4F9; 
            --border-color: #ccc;
        }
        
        body { background: var(--bg-light); font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        header { 
            background: var(--simonetti-red); padding: 1vh 2vw; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.6vh solid var(--simonetti-pink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            height: 8vh;
        }

        h1 { margin: 0; font-size: 2.2rem; color: #fff; font-weight: 900; }

        .main-container { 
            display: flex; 
            height: 88vh; 
            padding: 15px; 
            gap: 15px; 
            box-sizing: border-box;
        }

        /* Tabela Adaptável */
        .table-section { 
            flex: 3; 
            background: #fff; 
            border-radius: 15px; 
            padding: 10px; 
            overflow-y: auto; 
            scrollbar-width: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            border: 2px solid var(--border-color);
        }
        .table-section::-webkit-scrollbar { display: none; }
        
        /* Lateral Adaptável */
        .dash-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            min-width: 320px;
        }

        .kpi-card { 
            background: #fff; padding: 1.5vh; text-align: center; border-radius: 15px;
            border-bottom: 0.8vh solid var(--simonetti-red); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .kpi-value { font-size: 3.5rem; font-weight: 900; color: var(--simonetti-red); display: block; line-height: 1; }
        .kpi-label { font-size: 1rem; font-weight: 700; color: #666; text-transform: uppercase; }

        /* Container do Gráfico - Ajuste para TV Grande */
        .chart-box { 
            background: #fff; padding: 15px; border-radius: 15px; 
            flex-grow: 1; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            border: 2px solid var(--border-color);
            display: flex; flex-direction: column; 
            position: relative;
            min-height: 0; /* Importante para flexbox não estourar */
        }
        .chart-container { 
            flex-grow: 1;
            position: relative; 
            width: 100%;
        }

        /* Estilo da Tabela com Linhas Fortes para TV */
        table.dataTable { border-collapse: collapse !important; width: 100% !important; }
        table.dataTable thead th { 
            background: #f8f9fa !important; font-size: 1.2rem !important; padding: 15px !important; 
            border: 1px solid var(--border-color) !important; border-bottom: 4px solid var(--simonetti-red) !important; color: #333 !important; 
        }
        table.dataTable tbody td { 
            font-size: 1.4rem !important; padding: 12px !important; text-align: center !important; 
            font-weight: 700; border: 1px solid var(--border-color) !important; 
        }

        .pill { padding: 6px 10px; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 800; display: inline-block; width: 95%; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        .bg-armario { background-color: #FFFF00; color: #000; }
        .bg-mesa { background-color: #00B050; color: #fff; }

        .box-green { color: #27ae60 !important; font-size: 2.8rem !important; }
        .box-red { color: #E74C3C !important; font-size: 2.8rem !important; }

        .btn-fullscreen { background: #fff; color: var(--simonetti-red); border: none; padding: 10px 20px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <h1>RECEBIMENTO SIMONETTI</h1>
    <button class="btn-fullscreen" id="fsBtn" onclick="toggleFullScreen()">📺 TELA CHEIA</button>
</header>

<div class="main-container">
    <div class="table-section" id="scrollContainer">
        <table id="tabelaTV" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>FORNECEDOR</th>
                    <th>TIPO DE PRODUTO</th>
                    <th>PRODUTO</th>                    
                    <th>STATUS</th>
                    <th>BOX</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="dash-section">
        <div class="kpi-card">
            <span class="kpi-label">TOTAL DE CARROS</span>
            <span id="countCarros" class="kpi-value">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">AGENDAS</span>
            <span id="countAgendas" class="kpi-value">0</span>
        </div>
        
        <div class="chart-box">
            <h3 style="margin: 0 0 10px 0; color:#444; font-size: 1.2rem; text-align: center;">STATUS DAS CARGAS</h3>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);

const csvUrl = "https://docs.google.com/spreadsheets/d/1Ore02M4GARvE6hldNDZmiVNDrABb4dgaZO7wlMY-fjs/export?format=csv&gid=2090543957";

const coresStatus = {
    "CARGA RECEBIDA": '#2ECC71', 
    "CANCELADA": '#E74C3C', 
    "EM RECEBIMENTO": '#F1C40F', 
    "NO PATIO - FICOU P/ AMANHÃ": '#34495E', 
    "SOB AJUSTE": '#8B27F5', 
    "REAGENDA": '#9B591B',
    "NO PATIO - FICOU DE ONTEM": '#B249BF',    
    "NO PATIO - SOB ENCAIXE": '#ff7625',         
    "NO PATIO": '#1A9EF0', 
    "EM ATRASO": '#FF1744'
};

let chartStatus;

$(document).ready(() => {
    carregarDados();
    setInterval(carregarDados, 120000); // 2 minutos
    iniciarAutoScroll();
});

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fsBtn').innerText = "✖ SAIR";
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
            document.getElementById('fsBtn').innerText = "📺 TELA CHEIA";
        }
    }
}

function carregarDados() {
    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            renderizar(results.data);
        }
    });
}

function renderizar(dados) {
    if ($.fn.DataTable.isDataTable('#tabelaTV')) $('#tabelaTV').DataTable().destroy();
    
    const body = $("#tabelaTV tbody").empty();
    const stats = {};
    const codigosUnicos = new Set();

    dados.forEach(r => {
        const codigo = (r["CODIGO"] || "").trim();
        const status = (r["STATUS"] || "PENDENTE").toUpperCase();
        const tipoProduto = (r["TIPO DE PRODUTO"] || "").toUpperCase(); // Mudei o nome
        const produto = (r["PRODUTO"] || "").toUpperCase();             // Nova variável
        const box = r["BOX"] || "-";

        if (codigo) codigosUnicos.add(codigo);
        stats[status] = (stats[status] || 0) + 1;

        // Lógica de cores baseada no TIPO DE PRODUTO
        let classeTipo = "";
        if(tipoProduto.includes("ARMARIO") || tipoProduto.includes("COZINHA")) classeTipo = "bg-armario";
        if(tipoProduto.includes("MESA")) classeTipo = "bg-mesa";

        const boxClass = (status === "CARGA RECEBIDA") ? "box-green" : "box-red";

        // AGORA COM TODAS AS COLUNAS NA ORDEM CERTA (6 colunas no total)
        body.append(`<tr>
            <td>${r["DATA"] || ""}</td>
            <td style="color:var(--simonetti-red)">${r["FORNECEDOR"] || ""}</td>
            <td class="${classeTipo}">${tipoProduto}</td>
            <td>${produto}</td> 
            <td><span class="pill" style="background:${coresStatus[status] || '#999'}">${status}</span></td>
            <td class="${boxClass}">${box}</td>
        </tr>`);
    });

    $('#tabelaTV').DataTable({ paging: false, info: false, ordering: false, searching: false, responsive: true });

    $("#countCarros").text(codigosUnicos.size);
    $("#countAgendas").text(dados.length);
    
    atualizarGrafico(stats, dados.length);
}

function atualizarGrafico(stats, total) {
    if(chartStatus) chartStatus.destroy();
    const ctx = document.getElementById('statusChart').getContext('2d');
    
    chartStatus = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(stats),
            datasets: [{
                data: Object.values(stats),
                backgroundColor: Object.keys(stats).map(k => coresStatus[k] || "#ccc"),
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            maintainAspectRatio: false,
            responsive: true,
            plugins: {
                legend: { 
                    position: 'bottom', 
                    labels: { font: { size: 12, weight: 'bold' }, padding: 10 } 
                },
                datalabels: {
                    color: '#fff',
                    font: { size: 16, weight: 'bold' },
                    textAlign: 'center',
                    formatter: (value) => {
                        let p = ((value/total)*100).toFixed(0) + "%";
                        return value + "\n(" + p + ")"; 
                    }
                }
            }
        }
    });
}

function iniciarAutoScroll() {
    const el = document.getElementById('scrollContainer');
    let speed = 1.0; 
    function step() {
        el.scrollTop += speed;
        if (el.scrollTop >= (el.scrollHeight - el.offsetHeight)) {
            setTimeout(() => { el.scrollTop = 0; }, 4000); 
        }
        requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}
</script>
</body>
</html>
