<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .admin { background: #fee2e2; color: #b91c1c; border: 1px solid #f87171; }
        .colaborador { background: #dbeafe; color: #1e40af; border: 1px solid #60a5fa; }
        .usuario { background: #dcfce7; color: #166534; border: 1px solid #4ade80; }
        .leitor { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        
        .btn-edit { background: #fbc02d; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-del { background: #f44336; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-content label { display: block; margin-top: 15px; font-weight: bold; font-size: 12px; color: #555; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* Grid de Centrais */
        .grid-centrais { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        .central-item { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; }
        .central-item input { width: auto; margin: 0; cursor: pointer; }

        .btn-save { width: 100%; background: #2e7d32; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 14px; }
        .btn-cancel { width: 100%; background: transparent; color: #666; border: none; padding: 10px; margin-top: 10px; cursor: pointer; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Painel Admin: <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2>👥 GESTÃO DE ACESSOS</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>E-MAIL</th>
                        <th>NÍVEL</th>
                        <th>CENTRAIS VINCULADAS</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios">
                    <tr><td colspan="5" style="text-align: center; padding: 40px; color: #888;">Carregando usuários...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modalUser">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: var(--primary);">Editar Usuário</h3>
        <input type="hidden" id="editUserId">
        
        <label>NOME COMPLETO</label>
        <input type="text" id="editNome">

        <label>NÍVEL DE ACESSO</label>
        <select id="editNivel">
            <option value="admin">Administrador (Acesso Total)</option>
            <option value="colaborador">Colaborador (Expedição)</option>
            <option value="usuario">Usuário (Conferência Central)</option>
            <option value="leitor">Leitor (Apenas relatório)</option>
        </select>

        <label>VINCULAR CENTRAIS (Selecione uma ou mais)</label>
        <div id="gridCentrais" class="grid-centrais">
            </div>

        <button class="btn-save" id="btnSalvarUser">SALVAR ALTERAÇÕES</button>
        <button class="btn-cancel" id="btnFecharModal">Voltar sem salvar</button>
    </div>
</div>

<script type="module" src="js/gestao-usuarios.js"></script>
</body>
</html>
