<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Qualidade - Simonetti</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --danger: #c62828; --success: #2e7d32; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; }
        
        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; height: 60px;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .btn-header {
            background: rgba(255, 255, 255, 0.15); border: 1px solid white; color: white;
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;
            text-decoration: none; font-size: 12px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-header:hover { background: rgba(255, 255, 255, 0.3); }

        /* Títulos Responsivos */
        .title-desktop { display: block; font-size: 16px; margin: 0; font-weight: bold; }
        .title-mobile { display: none; font-size: 16px; margin: 0; font-weight: bold; }

        .container { padding: 15px; max-width: 1400px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .periodo-box { 
            display: flex; gap: 15px; align-items: center; margin-bottom: 20px; 
            padding: 15px; background: #f8f9fa; border-radius: 6px; border: 1px solid #ddd; flex-wrap: wrap;
        }

        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; min-width: 1000px; }
        th { 
            background: #f1f1f1; padding: 12px 10px; text-align: left; 
            border-bottom: 2px solid #ddd; font-size: 11px; color: var(--dark);
            cursor: pointer; position: relative;
        }
        th:hover { background: #e5e5e5; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 12px; vertical-align: middle; }

        .filter-input { width: 100%; padding: 4px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 10px; }

        .status-badge {
            display: inline-block; padding: 5px 10px; border-radius: 15px;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .bg-ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .bg-avaria { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
        
        .btn-ver-avaria { 
            background: #fdf2f2; color: #d32f2f; border: 1px solid #d32f2f;
            padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold;
        }

        #modalAvaria {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px; width: 95%; max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative;
        }
        
        .btn-export { border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; display: flex; gap: 5px; }
        .btn-excel { background: #1b5e20; }
        .btn-pdf { background: #b71c1c; }

        /* RESPONSIVIDADE CELULAR */
        @media (max-width: 600px) {
            header { padding: 0 10px; }
            .title-desktop { display: none; }
            .title-mobile { display: block; }
            #userName { display: none; } /* Esconde nome no celular para sobrar espaço */
            .btn-header { padding: 8px 10px; font-size: 11px; }
            
            .periodo-box { flex-direction: column; align-items: stretch; }
            .periodo-box div { width: 100%; }
            .periodo-box div:last-child { justify-content: space-between; width: 100%; }
        }
    </style>
</head>
<body>

<div id="modalAvaria">
    <div class="modal-content">
        <span class="modal-close" style="position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer;" onclick="fecharModal()">&times;</span>
        <div class="modal-header">
            <h2 id="modalTitle" style="margin:0; font-size: 18px; color: var(--primary); border-bottom: 2px solid #fdf2f2; padding-bottom: 10px;">📋 Detalhes da Ocorrência</h2>
        </div>
        <div id="modalBody" style="max-height: 400px; overflow-y: auto; margin-top: 15px;"></div>
    </div>
</div>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-header">⬅ VOLTAR</a>
    </div>
    
    <h1 class="title-desktop">GESTÃO DE QUALIDADE SIMONETTI</h1>
    <h1 class="title-mobile">RELATÓRIO MS</h1>
    
    <div class="header-right" style="display: flex; align-items: center; gap: 10px;">
        <span id="userName" style="font-size: 12px;">👤...</span>
        <button class="btn-header" id="btnLogout">SAIR</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <div class="periodo-box">
            <div><label style="font-size:11px; font-weight:bold;">INÍCIO</label><br><input type="date" id="dataInicio" style="width:100%; box-sizing:border-box;"></div>
            <div><label style="font-size:11px; font-weight:bold;">FIM</label><br><input type="date" id="dataFim" style="width:100%; box-sizing:border-box;"></div>
            <button class="btn-header" style="background:var(--primary); height:35px; margin-top:16px;" onclick="filtrarPorPeriodo()">🔍 FILTRAR</button>
            <div style="flex-grow: 1; text-align: right; display: flex; justify-content: flex-end; gap: 10px; margin-top:16px;">
                <button class="btn-export btn-excel" onclick="exportarExcel()">📊 EXCEL</button>
                <button class="btn-export btn-pdf" onclick="exportarPDF()">📄 PDF PREMIUM</button>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table id="tabelaQualidade">
                <thead>
                    <tr>
                        <th onclick="ordenar('data')">DATA ⇅ <input type="text" class="filter-input" data-col="data" placeholder="..."></th>
                        <th onclick="ordenar('codigo')">EXP ⇅ <input type="text" class="filter-input" data-col="codigo" placeholder="..."></th>
                        <th onclick="ordenar('destino')">DESTINO ⇅ <input type="text" class="filter-input" data-col="destino" placeholder="..."></th>
                        <th onclick="ordenar('placa')">PLACA ⇅ <input type="text" class="filter-input" data-col="placa" placeholder="..."></th>
                        <th onclick="ordenar('equipe')">EQUIPE ⇅ <input type="text" class="filter-input" data-col="equipe" placeholder="..."></th>
                        <th>OCORRÊNCIAS <input type="text" class="filter-input" data-col="detalhesAvaria" placeholder="..."></th>
                        <th onclick="ordenar('situacaoStr')">SITUAÇÃO ⇅ <input type="text" class="filter-input" data-col="situacaoStr" placeholder="..."></th> 
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    // Mantenha seu script do Firebase aqui (o código que você enviou está completo e funcional)
    // O ajuste foi focado no HTML/CSS para garantir a organização visual.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let todosOsDados = [];
    let mapaFornecedores = {};
    let ordemCrescente = true;

    onAuthStateChanged(auth, async user => {
        if(user) { 
            const userSnap = await getDoc(doc(db, "usuarios", user.uid));
            document.getElementById('userName').innerText = "👤 " + (userSnap.exists() ? userSnap.data().nome.split(' ')[0] : "Usuário");
            await carregarMapaFornecedores();
            setarDatasPadrao();
            filtrarPorPeriodo(); 
        } else { window.location.href = "index.html"; }
    });

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    function setarDatasPadrao() {
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataInicio').value = hoje;
        document.getElementById('dataFim').value = hoje;
    }

    async function carregarMapaFornecedores() {
        const snap = await getDocs(collection(db, "produtos_lista"));
        snap.forEach(d => { mapaFornecedores[d.data().codigo] = d.data().fornecedor || "N/I"; });
    }

    window.filtrarPorPeriodo = async () => {
        const dIni = document.getElementById('dataInicio').value;
        const dFim = document.getElementById('dataFim').value;
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '<tr><td colspan="7" style="text-align:center;">Processando...</td></tr>';

        try {
            const [avSnap, expSnap] = await Promise.all([
                getDocs(collection(db, "avarias")),
                getDocs(query(collection(db, "expedicoes"), where("status", "==", "FINALIZADO"), where("data", ">=", dIni), where("data", "<=", dFim)))
            ]);

            let mapaAvarias = {};
            avSnap.forEach(docA => {
                const av = docA.data();
                if (!mapaAvarias[av.expedicaoId]) mapaAvarias[av.expedicaoId] = [];
                mapaAvarias[av.expedicaoId].push(av);
            });

            todosOsDados = [];
            expSnap.forEach(docExp => {
                const exp = docExp.data();
                const avarias = mapaAvarias[docExp.id] || null;
                todosOsDados.push({
                    data: exp.data ? exp.data.split('-').reverse().join('/') : '-',
                    codigo: exp.codigo || exp.expedicao || 'N/A',
                    destino: exp.destino || '-',
                    placa: exp.placa || '-',
                    equipe: (exp.equipe_carregamento || []).join(', '),
                    avarias: avarias,
                    detalhesAvaria: avarias ? avarias.map(a => `${a.codigoProduto} ${a.nomeProduto}`).join(" ") : "",
                    situacaoStr: avarias ? "AVARIA" : "OK"
                });
            });
            renderizarTabela(todosOsDados);
        } catch (e) { console.error(e); }
    };

    function renderizarTabela(lista) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        lista.forEach((item, index) => {
            const statusBadge = item.avarias ? `<span class="status-badge bg-avaria">⚠️ DIVERGÊNCIA</span>` : `<span class="status-badge bg-ok">✅ OK</span>`;
            const btnAvaria = item.avarias ? `<button class="btn-ver-avaria" onclick="verDetalhes(${index})">🔎 VER DETALHES (${item.avarias.length})</button>` : `<span style="color:#999">Sem ocorrências</span>`;
            
            corpo.innerHTML += `
                <tr>
                    <td>${item.data}</td>
                    <td><b>${item.codigo}</b></td>
                    <td>${item.destino}</td>
                    <td>${item.placa}</td>
                    <td><small>${item.equipe}</small></td>
                    <td>${btnAvaria}</td>
                    <td>${statusBadge}</td>
                </tr>`;
        });
    }

    window.verDetalhes = (index) => {
        const item = todosOsDados[index];
        const modal = document.getElementById('modalAvaria');
        const body = document.getElementById('modalBody');
        let html = `<div style="padding:10px; background:#f9f9f9; border-radius:8px; margin-bottom:15px; border-left:4px solid var(--primary);">
                        <b>Expedição:</b> ${item.codigo} | <b>Destino:</b> ${item.destino}
                    </div>`;

        item.avarias.forEach(a => {
            const forn = a.fornecedor || mapaFornecedores[a.codigoProduto] || "N/I";
            html += `<div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                        <span style="color:var(--primary); font-weight:bold;">[${a.codigoProduto}] ${a.nomeProduto}</span><br>
                        <small><b>FORNECEDOR:</b> ${forn}</small><br>
                        <small><b>MOTIVO:</b> ${a.motivo} | <b>QTD:</b> ${a.quantidade}</small><br>
                        <p style="margin:5px 0; font-size:11px; background:#fff; padding:5px; border-radius:4px;"><b>OBS:</b> ${a.descricao || 'Sem observações'}</p>
                     </div>`;
        });
        body.innerHTML = html;
        modal.style.display = 'flex';
    };

    window.fecharModal = () => document.getElementById('modalAvaria').style.display = 'none';

    window.ordenar = (campo) => {
        ordemCrescente = !ordemCrescente;
        todosOsDados.sort((a, b) => {
            let valA = String(a[campo]).toLowerCase();
            let valB = String(b[campo]).toLowerCase();
            return ordemCrescente ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });
        renderizarTabela(todosOsDados);
    };

    window.exportarPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.setFillColor(211, 47, 47);
        doc.rect(0, 0, 297, 30, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18);
        doc.text("RELATÓRIO DE QUALIDADE - SIMONETTI", 15, 15);
        doc.setFontSize(10);
        doc.text(`Período: ${document.getElementById('dataInicio').value} até ${document.getElementById('dataFim').value}`, 15, 22);
        doc.text(`Emissão: ${new Date().toLocaleString()}`, 15, 27);

        const colunas = ["DATA", "EXP", "DESTINO", "PLACA", "EQUIPE", "DETALHES DA OCORRÊNCIA", "SITUAÇÃO"];
        const linhas = todosOsDados.map(item => {
            let textoAvaria = "OK";
            if (item.avarias && item.avarias.length > 0) {
                textoAvaria = item.avarias.map(a => {
                    const forn = a.fornecedor || mapaFornecedores[a.codigoProduto] || "N/I";
                    const obs = a.descricao ? `\nOBS: ${a.descricao}` : "";
                    return `PRODUTO: ${a.nomeProduto}\nFORNECEDOR: ${forn}\nMOTIVO: ${a.motivo} (Qtd: ${a.quantidade})${obs}`;
                }).join("\n--------------------------\n");
            }
            return [item.data, item.codigo, item.destino, item.placa, item.equipe, textoAvaria, item.situacaoStr];
        });

        doc.autoTable({
            head: [colunas],
            body: linhas,
            startY: 35,
            styles: { fontSize: 7, cellPadding: 3, valign: 'middle' },
            headStyles: { fillColor: [240, 240, 240], textColor: [50, 50, 50], fontStyle: 'bold' },
            columnStyles: { 5: { cellWidth: 100 }, 6: { fontStyle: 'bold', halign: 'center' } },
            didParseCell: function(data) {
                if (data.section === 'body' && data.column.index === 6) {
                    data.cell.styles.textColor = (data.cell.raw === "AVARIA") ? [190, 0, 0] : [0, 130, 0];
                }
            }
        });
        doc.save(`Relatorio_Qualidade_Simonetti.pdf`);
    };

    document.querySelectorAll('.filter-input').forEach(input => {
        input.addEventListener('keyup', (e) => {
            e.stopPropagation();
            const filtros = {};
            document.querySelectorAll('.filter-input').forEach(i => { if (i.value) filtros[i.dataset.col] = i.value.toLowerCase(); });
            const filtrados = todosOsDados.filter(item => {
                return Object.keys(filtros).every(col => String(item[col]).toLowerCase().includes(filtros[col]));
            });
            renderizarTabela(filtrados);
        });
    });
</script>
</body>
</html>
