<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Qualidade - Simonetti</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; color: #333; }
        
        header { 
            background: var(--primary); color: white; padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .container { padding: 15px; max-width: 1400px; margin: auto; }

        /* Totalizadores (KPIs) */
        .dashboard-resumo { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .kpi-card { 
            background: var(--white); padding: 15px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid var(--primary); 
            flex: 1; min-width: 150px; text-align: center;
        }
        .kpi-card span { display: block; font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; }
        .kpi-card strong { font-size: 22px; color: var(--primary); }

        .card { background: var(--white); padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .filtros-topo { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .campo-data { display: flex; flex-direction: column; gap: 5px; }
        .campo-data input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-filtrar { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Tabela Responsiva */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 4px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; background: white; }
        thead th { background: #f5f5f5; padding: 12px 8px; font-size: 11px; text-transform: uppercase; border: 1px solid #ddd; cursor: pointer; }
        tbody td { padding: 10px 8px; border: 1px solid #eee; font-size: 12px; text-align: center; }
        
        .filter-input { width: 90%; padding: 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; margin-top: 5px; }
        
        /* Badges e Botões */
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; color: white; }
        .bg-avaria { background: #d32f2f; }
        .bg-ok { background: #2e7d32; }
        .btn-ver-avaria { background: #0d47a1; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        /* Modal */
        #modalAvaria { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }

        @media (max-width: 600px) {
            .btn-export { width: 100%; margin-top: 5px; }
            .kpi-card { padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" style="color:white; text-decoration:none; font-size:18px;">⬅️</a>
        <span id="userName">Carregando...</span>
    </div>
    <button class="btn-sair" id="btnLogout">SAIR</button>
</header>

<div class="container">
    <div class="dashboard-resumo">
        <div class="kpi-card"><span>Total Expedições</span><strong id="totalExp">0</strong></div>
        <div class="kpi-card"><span>Total de Veículos</span><strong id="totalCarros">0</strong></div>
        <div class="kpi-card"><span>Com Divergência</span><strong id="totalAvarias">0</strong></div>
    </div>

    <div class="card">
        <div class="filtros-topo">
            <div class="campo-data">
                <label style="font-size:11px; font-weight:bold;">INÍCIO:</label>
                <input type="date" id="dataInicio">
            </div>
            <div class="campo-data">
                <label style="font-size:11px; font-weight:bold;">FIM:</label>
                <input type="date" id="dataFim">
            </div>
            <button class="btn-filtrar" onclick="filtrarPorPeriodo()">BUSCAR DADOS</button>
            <button onclick="exportarPDF()" style="background:#444; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">PDF</button>
        </div>

        <div class="table-wrapper">
            <table id="tabelaMaster">
                <thead>
                    <tr>
                        <th onclick="ordenar('data')">DATA<br><input type="text" class="filter-input" data-col="data" placeholder="Filtro..."></th>
                        <th onclick="ordenar('codigo')">EXP<br><input type="text" class="filter-input" data-col="codigo" placeholder="Filtro..."></th>
                        <th onclick="ordenar('destino')">DESTINO<br><input type="text" class="filter-input" data-col="destino" placeholder="Filtro..."></th>
                        <th onclick="ordenar('placa')">PLACA<br><input type="text" class="filter-input" data-col="placa" placeholder="Filtro..."></th>
                        <th>EQUIPE<br><input type="text" class="filter-input" data-col="equipe" placeholder="Filtro..."></th>
                        <th>OCORRÊNCIA</th>
                        <th onclick="ordenar('situacaoStr')">SITUAÇÃO</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalAvaria">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--primary);">Detalhes da Ocorrência</h3>
        <div id="modalBody"></div>
        <button onclick="fecharModal()" style="width:100%; margin-top:15px; padding:10px; background:#666; color:white; border:none; border-radius:4px; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script type="module" src="js/relatorio-produtividade.js"></script>
</body>
</html>
