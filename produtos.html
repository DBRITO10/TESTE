<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos - Simonetti</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { 
            background: var(--primary); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 900px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        h3 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .full-width { grid-column: span 2; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-add:hover { background: #b71c1c; }

        .import-section { border: 2px dashed #ccc; padding: 15px; text-align: center; border-radius: 8px; margin-top: 10px; background: #fafafa; }
        .btn-import { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        
        /* AJUSTE SOLICITADO: Cabeçalho Vermelho com Texto Branco */
        th { 
            background: var(--primary); 
            padding: 12px; 
            text-align: left; 
            color: white; 
            border-bottom: 2px solid #b71c1c; 
            text-transform: uppercase; 
        }
        
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .btn-edit { color: #fbc02d; cursor: pointer; margin-right: 15px; font-size: 18px; }
        .btn-del { color: #f44336; cursor: pointer; font-size: 18px; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Olá, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h3>📦 Cadastro de Produto</h3>
        <div class="form-grid">
            <input type="text" id="prodFornecedor" placeholder="Fornecedor (Ex: ELECTROLUX)" class="full-width">
            <input type="text" id="prodCodigo" placeholder="Código (Ex: 1010)">
            <input type="text" id="prodNome" placeholder="Descrição do Produto">
        </div>
        <button class="btn-add" id="btnSalvar">SALVAR PRODUTO</button>
    </div>

    <div class="card">
        <h3>📂 Importar Planilha</h3>
        <p style="font-size: 12px; color: #666;">Colunas esperadas: <b>Fornecedor, Código, Descrição</b></p>
        <div class="import-section">
            <input type="file" id="inputPlanilha" accept=".xlsx, .xls, .csv" style="border:none;">
            <button class="btn-import" id="btnProcessar">🚀 IMPORTAR DADOS</button>
        </div>
    </div>

    <div class="card">
        <input type="text" id="inputBusca" placeholder="🔍 Buscar por fornecedor, código ou nome..." onkeyup="filtrar()">
        <div class="table-wrapper">
            <table id="tabelaProdutos">
                <thead>
                    <tr>
                        <th>Fornecedor</th>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="listaProdutos">
                    <tr><td colspan="4" style="text-align: center; padding: 20px;">Carregando lista...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="js/produtos.js"></script>
</body>
</html>
