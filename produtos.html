<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Simonetti</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg: #f8f9fa; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { 
            background: var(--primary); color: white; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-left { width: 30%; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .header-center { width: 40%; text-align: center; font-weight: 900; font-size: 16px; letter-spacing: 1px; }
        .header-right { width: 30%; text-align: right; }
        .btn-voltar { color: white; text-decoration: none; font-size: 22px; line-height: 1; }
        .btn-sair { background: rgba(0,0,0,0.2); color: white; border: 1px solid white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .container { padding: 15px; max-width: 900px; margin: auto; }
        
        .card-cadastro { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid #2e7d32; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; text-transform: uppercase; }
        
        .btn-acao { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; }
        .btn-save-manual { background: #2e7d32; color: white; }
        .btn-import { background: #1976d2; color: white; margin-top: 10px; }
        .import-box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 2px dashed #bbb; }

        .grid-fornecedores { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card-forn { 
            background: white; padding: 25px 15px; border-radius: 12px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s;
            border-bottom: 4px solid var(--primary); font-weight: bold; color: #333;
        }
        .card-forn:hover { transform: translateY(-3px); background: #fff5f5; }

        /* Modais */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; padding: 10px; overflow-y: auto; }
        .modal-edit { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 600px; margin: 20px auto; border-radius: 15px; padding: 20px; box-sizing: border-box; }
        .edit-content { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .item-produto { border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        label { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 4px; display: block; margin-top: 10px; }

        @media (max-width: 600px) {
            .header-center { font-size: 12px; }
            .grid-fornecedores { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-voltar">⬅</a>
        <span id="userName">...</span>
    </div>
    <div class="header-center">GESTÃO DE PRODUTOS</div>
    <div class="header-right">
        <button class="btn-sair" id="btnSair">SAIR</button>
    </div>
</header>

<div class="container">
    <div class="card-cadastro">
        <h3 style="margin-top:0; font-size:16px;">➕ Cadastro Manual de Produto</h3>
        <div class="grid-inputs">
            <input type="text" id="manualForn" placeholder="FORNECEDOR">
            <input type="text" id="manualCod" placeholder="CÓDIGO">
            <input type="text" id="manualDesc" placeholder="DESCRIÇÃO">
            <input type="text" id="manualGrade" placeholder="GRADE">
            <input type="number" step="0.01" id="manualCusto" placeholder="CUSTO R$">
        </div>
        <button class="btn-acao btn-save-manual" id="btnSalvarManual">SALVAR PRODUTO</button>
    </div>

    <div class="import-box">
        <small style="color:#666">Sincronizar via planilha:</small><br><br>
        <input type="file" id="inputPlanilha" accept=".xlsx, .xls, .csv">
        <button class="btn-acao btn-import" id="btnProcessar">🚀 SINCRONIZAR PLANILHA</button>
    </div>

    <div style="margin-bottom:20px;">
        <input type="text" id="inputBusca" placeholder="🔍 Buscar Fornecedor ou Produto..." onkeyup="filtrarGeral()">
    </div>

    <div id="gridFornecedores" class="grid-fornecedores"></div>
</div>

<div id="modalLista" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--primary); padding-bottom:10px; margin-bottom:15px;">
            <h3 id="nomeFornModal" style="margin:0;">FORNECEDOR</h3>
            <button onclick="fecharModal('modalLista')" style="border:none; background:none; font-size:28px; cursor:pointer;">&times;</button>
        </div>
        <div id="corpoListaProdutos"></div>
    </div>
</div>

<div id="modalEdit" class="modal-edit">
    <div class="edit-content">
        <h3 style="margin-top:0; color:var(--primary);">Editar Produto</h3>
        
        <input type="hidden" id="editId">
        
        <label>FORNECEDOR</label>
        <input type="text" id="editForn">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>CÓDIGO</label>
                <input type="text" id="editCod">
            </div>
            <div style="flex:1;">
                <label>GRADE</label>
                <input type="text" id="editGrade">
            </div>
        </div>

        <label>DESCRIÇÃO</label>
        <input type="text" id="editDesc">

        <label>CUSTO UNITÁRIO (R$)</label>
        <input type="number" step="0.01" id="editCusto">

        <div style="margin-top:25px; display:flex; gap:10px;">
            <button class="btn-acao" style="background:#ddd;" onclick="fecharModal('modalEdit')">CANCELAR</button>
            <button class="btn-acao" id="btnSalvarEdicao" style="background:#2e7d32; color:white;">SALVAR ALTERAÇÕES</button>
        </div>
    </div>
</div>

<script type="module" src="js/produtos.js"></script>
</body>
</html>
