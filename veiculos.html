<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Frota - Simonetti</title>
    <style>
        :root {
            --primary: #d32f2f;
            --bg-body: #fdf2f2;
            --white: #ffffff;
            --text: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            --success: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; }
        
        .btn-sair {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--white);
            color: var(--white);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            text-transform: uppercase;
            font-size: 16px; /* Evita zoom no iPhone */
        }

        .btn-salvar {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-cancelar {
            width: 100%;
            background: #757575;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Escondido por padrão */
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 13px; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .btn-edit { color: #1976d2; cursor: pointer; font-weight: bold; margin-right: 15px; border: none; background: none; }
        .btn-delete { color: #c62828; cursor: pointer; font-weight: bold; border: none; background: none; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            td, th { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Olá, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2 id="tituloForm">CADASTRAR VEÍCULO</h2>
        <form id="formVeiculo">
            <input type="hidden" id="editId">
            
            <label>PLACA DO VEÍCULO</label>
            <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>

            <label>TIPO DE VEÍCULO</label>
            <select id="tipoVeiculo" required>
                <option value="">SELECIONE O TIPO</option>
                <option value="CARRETA">CARRETA</option>
                <option value="TRUCK">TRUCK</option>
                <option value="TOCO">TOCO</option>
                <option value="CARRO 3/4">CARRO 3/4</option>
            </select>

            <button type="submit" class="btn-salvar" id="btnSalvar">CADASTRAR VEÍCULO</button>
            <button type="button" class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicao()">CANCELAR EDIÇÃO</button>
        </form>
    </div>

    <div class="card table-container">
        <h2>FROTA CADASTRADA</h2>
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>TIPO</th>
                    <th style="text-align: right;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr><td colspan="3" style="text-align:center;">Carregando frota...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module" src="js/veiculos.js"></script>
</body>
</html>
